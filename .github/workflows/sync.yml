name: Barchart Sync

on:
  schedule:
    # Monday–Friday: 10 min before every hour (data fetch)
    - cron: '50 * * * 1-5'
    # Monday–Friday: 5 min after every hour (safety re-fetch, confirms data is fresh)
    - cron: '5 * * * 1-5'
    # Sunday: 20:50, 21:50, 22:50 UTC (10 min before WAT market hours)
    - cron: '50 20-22 * * 0'
    # Sunday: 21:05, 22:05, 23:05 UTC (5 min after, safety re-fetch)
    - cron: '5 21-23 * * 0'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run sync (once)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: npx ts-node src/index.ts --once
